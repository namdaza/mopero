# ============================================================
# SLAM Toolbox - Cấu hình tin Lidar hơn bánh xe
# Vấn đề: Map bị chồng lên nhau do odometry (bánh xe) bị drift
# Giải pháp: Giảm variance_penalty → SLAM được phép "bỏ qua" lỗi của bánh xe
#            và tin tưởng vào kết quả scan matching của Lidar hơn
# ============================================================

solver_plugin: solver_plugins::CeresSolver
ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
ceres_preconditioner: SCHUR_JACOBI
ceres_trust_strategy: LEVENBERG_MARQUARDT
ceres_dogleg_type: TRADITIONAL_DOGLEG
ceres_loss_function: None

# Frame IDs
odom_frame: odom
map_frame: map
base_frame: base_footprint
scan_topic: /scan
use_map_saver: true
mode: mapping

# ----------------------------------------------------------
# PHẦN QUAN TRỌNG NHẤT: Mức độ tin tưởng vào odometry
# ----------------------------------------------------------
# distance_variance_penalty và angle_variance_penalty:
#   - Giá trị CAO  → SLAM bị phạt nặng nếu scan match lệch xa odometry
#                  → SLAM phụ thuộc nhiều vào bánh xe (odometry driven)
#   - Giá trị THẤP → SLAM ít bị phạt khi lệch xa odometry
#                  → SLAM tự do theo scan matching của Lidar hơn
#
# Mặc định: distance=0.5, angle=1.0
# Chỉnh về thấp: Tin Lidar hơn, bỏ qua lỗi bánh xe
distance_variance_penalty: 0.1     # Giảm từ 0.5 → 0.1: rất ít tin odometry khoảng cách
angle_variance_penalty: 0.3        # Giảm từ 1.0 → 0.3: ít tin odometry góc quay

# ----------------------------------------------------------
# Scan Matching - Vùng tìm kiếm tương quan
# ----------------------------------------------------------
# Khi SLAM muốn tìm vị trí tốt nhất để khớp scan mới với map cũ,
# nó tìm kiếm trong vùng này. Vùng rộng hơn = tìm được vị trí đúng hơn
# dù odometry bị sai nhiều, nhưng cũng tốn CPU hơn.
correlation_search_space_dimension: 0.5   # mét - vùng tìm kiếm (tăng nếu drift lớn)
correlation_search_space_resolution: 0.01 # mét - độ phân giải lưới tìm kiếm
correlation_search_space_smear_deviation: 0.1  # làm mờ nhẹ để tìm kiếm robust hơn

# Fine search sau khi có vị trí coarse
fine_search_angle_offset: 0.00349    # ~0.2° - tìm kiếm tinh chỉnh góc
coarse_search_angle_offset: 0.349    # ~20° - tìm kiếm thô góc ban đầu
coarse_angle_resolution: 0.0349      # ~2° - độ phân giải góc thô

minimum_angle_penalty: 0.9
minimum_distance_penalty: 0.5
use_response_expansion: true         # Mở rộng tìm kiếm nếu không tìm thấy match tốt

# ----------------------------------------------------------
# Điều kiện tạo Node mới trong PoseGraph
# ----------------------------------------------------------
# Robot di chuyển bao nhiêu thì mới tạo điểm mới trên bản đồ.
# Giá trị nhỏ hơn = cập nhật bản đồ thường xuyên hơn = map mịn hơn
# nhưng tốn CPU hơn trên Jetson Nano
minimum_time_interval: 0.5           # giây
minimum_travel_distance: 0.15        # mét (~15cm mới tạo node mới)
minimum_travel_heading: 0.2          # radian (~11°)

# ----------------------------------------------------------
# Loop Closure - Tự động sửa lỗi khi đi qua vùng đã vẽ
# ----------------------------------------------------------
do_loop_closing: true                # BẮT BUỘC BẬT: sửa drift tự động
loop_search_space_dimension: 5.0
loop_search_maximum_distance: 3.0
loop_match_minimum_chain_size: 10
loop_match_maximum_variance_covariance: 3.0
loop_match_minimum_response_coarse: 0.35
loop_match_minimum_response_fine: 0.45

# Link match giữa các scan liên tiếp
link_match_minimum_response_fine: 0.45
link_scan_maximum_distance: 1.5

# ----------------------------------------------------------
# Scan buffer và độ phân giải map
# ----------------------------------------------------------
scan_buffer_size: 10                 # Số scan lưu trong buffer để match
scan_buffer_maximum_scan_distance: 10.0

# Map resolution và publish
transform_publish_period: 0.02       # 50Hz - TF mượt hơn
map_update_interval: 5.0             # giây - cập nhật map mỗi 5 giây
resolution: 0.05                     # 5cm/pixel - độ phân giải bản đồ
max_laser_range: 12.0                # RPLidar A1 tối đa 12m
